<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1a73e8"/>
    </marker>
    <style>
      .lane { fill:none; stroke:#999; stroke-width:1; stroke-dasharray:4 3; }
      .stepbox { fill:#f7f7f7; stroke:#333; stroke-width:1.2; }
      .workerbox { fill:#e8f0fe; stroke:#1a73e8; stroke-width:1.2; }
      .httpbox { fill:#e6f4ea; stroke:#137333; stroke-width:1.2; }
      .sharedbox { fill:#fff8e1; stroke:#b6862c; stroke-width:1.2; }
      text { font-family: -apple-system, 'Segoe UI', sans-serif; fill:#222; font-size:12px; }
      .title { font-weight:600; font-size:14px; }
      .lane-title { font-weight:700; font-size:13px; }
      .small { font-size:11px; fill:#555; }
      line.flow { stroke:#333; stroke-width:1.2; fill:none; }
      line.signal { stroke:#1a73e8; stroke-width:1.5; fill:none; stroke-dasharray:5 3; }
    </style>
  </defs>

  <text x="410" y="26" text-anchor="middle" class="title" font-size="16">Threading model and frame hand-off</text>

  <!-- Worker lane -->
  <rect class="lane" x="30" y="50" width="300" height="380" rx="6"/>
  <text x="180" y="72" text-anchor="middle" class="lane-title" fill="#1a73e8">DepthWorker thread</text>

  <!-- Shared lane -->
  <rect class="lane" x="350" y="50" width="170" height="380" rx="6"/>
  <text x="435" y="72" text-anchor="middle" class="lane-title" fill="#b6862c">Shared state (lock + Event)</text>

  <!-- HTTP lane -->
  <rect class="lane" x="540" y="50" width="260" height="380" rx="6"/>
  <text x="670" y="72" text-anchor="middle" class="lane-title" fill="#137333">Flask /stream request thread</text>

  <!-- Worker steps -->
  <rect class="workerbox" x="60" y="100" width="240" height="32" rx="4"/>
  <text x="180" y="120" text-anchor="middle">cap.read()</text>

  <rect class="workerbox" x="60" y="146" width="240" height="32" rx="4"/>
  <text x="180" y="166" text-anchor="middle">preprocess(frame)</text>

  <rect class="workerbox" x="60" y="192" width="240" height="32" rx="4"/>
  <text x="180" y="212" text-anchor="middle">session.run(ONNX)  ← MIGraphX</text>

  <rect class="workerbox" x="60" y="238" width="240" height="32" rx="4"/>
  <text x="180" y="258" text-anchor="middle">depth_to_colormap + hstack</text>

  <rect class="workerbox" x="60" y="284" width="240" height="32" rx="4"/>
  <text x="180" y="304" text-anchor="middle">cv2.imencode → jpg</text>

  <rect class="workerbox" x="60" y="330" width="240" height="50" rx="4"/>
  <text x="180" y="350" text-anchor="middle">with lock:  latest_jpeg = jpg</text>
  <text x="180" y="368" text-anchor="middle">frame_event.set()</text>

  <!-- shared box -->
  <rect class="sharedbox" x="365" y="160" width="140" height="180" rx="6"/>
  <text x="435" y="182" text-anchor="middle" class="title">DepthWorker</text>
  <text x="435" y="205" text-anchor="middle" class="small">latest_jpeg: bytes</text>
  <text x="435" y="225" text-anchor="middle" class="small">fps: float</text>
  <text x="435" y="252" text-anchor="middle" class="small">lock: Lock</text>
  <text x="435" y="272" text-anchor="middle" class="small">frame_event: Event</text>
  <text x="435" y="305" text-anchor="middle" class="small">(only the latest frame)</text>
  <text x="435" y="322" text-anchor="middle" class="small">(stale frames discarded)</text>

  <!-- HTTP steps -->
  <rect class="httpbox" x="555" y="146" width="240" height="32" rx="4"/>
  <text x="675" y="166" text-anchor="middle">frame_event.wait(timeout=1.0)</text>

  <rect class="httpbox" x="555" y="192" width="240" height="32" rx="4"/>
  <text x="675" y="212" text-anchor="middle">frame_event.clear()</text>

  <rect class="httpbox" x="555" y="238" width="240" height="32" rx="4"/>
  <text x="675" y="258" text-anchor="middle">jpg = worker.get_jpeg()</text>

  <rect class="httpbox" x="555" y="284" width="240" height="50" rx="4"/>
  <text x="675" y="304" text-anchor="middle">yield (boundary + headers</text>
  <text x="675" y="322" text-anchor="middle">+ jpg) ← send 1 frame</text>

  <!-- worker → shared write arrows -->
  <line class="flow" x1="305" y1="355" x2="365" y2="270" marker-end="url(#arrow)"/>
  <text x="320" y="332" class="small" fill="#b6862c">write</text>

  <!-- worker → http signal -->
  <path d="M 300 355 Q 530 410 555 162" class="signal" marker-end="url(#arrow-blue)"/>
  <text x="430" y="425" text-anchor="middle" class="small" fill="#1a73e8">Event.set() wakes the HTTP thread</text>

  <!-- shared → http read arrow -->
  <line class="flow" x1="510" y1="258" x2="555" y2="258" marker-end="url(#arrow)"/>
  <text x="535" y="252" class="small" fill="#b6862c">read</text>

  <!-- loop arrow on worker -->
  <path d="M 60 380 Q 30 380 30 110 Q 30 100 60 100" class="flow" fill="none" marker-end="url(#arrow)"/>
  <text x="20" y="245" class="small" fill="#1a73e8">loop</text>

  <!-- loop arrow on http -->
  <path d="M 555 320 Q 540 320 540 162 Q 540 152 555 152" class="flow" fill="none" marker-end="url(#arrow)"/>
  <text x="528" y="245" class="small" fill="#137333">loop</text>
</svg>
